<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PhoneXPert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">

</head>
<body>

<div class="wrapper">

    <div id="header"></div>

    <main>
        <div class="container mt-5">
            <h1 class="text-center text-muted">Willkommen bei PhoneXPert</h1>
        </div>

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <input type="text" id="produktSuche" class="form-control" placeholder="Produkte durchsuchen...">
                </div>
            </div>
        </div>


        <div class="container mt-5">
            <h2 class="mb-4">Unsere Produkte</h2>
            <div id="produktContainer" class="row g-4"></div>
        </div>
    </main>


    <div id="footer"></div>

</div>

</div>

<script>
    $("#header").load("../components/header.html?v=" + new Date().getTime());
</script>

<script>
    $("#footer").load("../components/footer.html");
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/index.js"></script>
</body>
</html>
